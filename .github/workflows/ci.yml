name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # Trigger bila ada tag seperti v1.0, v1.0.1
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_GATEWAY: ${{ github.repository }}-gateway
  IMAGE_NAME_PYTHON: ${{ github.repository }}-python

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Python linting
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dev dependencies
      run: |
        pip install black flake8
    
    - name: Run Black (check formatting)
      run: black --check mock_service.py mock_service2.py
    
    - name: Run Flake8 (linting)
      run: flake8 mock_service.py mock_service2.py --max-line-length=88 --ignore=E203,W503
    
    # Rust linting
    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable
        rustup component add clippy rustfmt
    
    - name: Check Rust formatting
      run: cargo fmt -- --check
    
    - name: Run Clippy (linting)
      run: cargo clippy -- -W warnings

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --release

    - name: Test
      run: cargo test -- --nocapture

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: gateway-binary
        path: target/release/simple-gateway

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker images
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GATEWAY }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PYTHON }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
    
    - name: Build and push Gateway Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.gateway
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Python Microservice Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.python
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max